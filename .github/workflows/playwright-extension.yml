name: Playwright Suites

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - feature/playwright-e2e-suite
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  mock-edge:
    name: Mock Edge
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mock edge Playwright suite
        run: npm run test:e2e:mock-edge

      - name: Upload mock edge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mock-edge-artifacts
          path: tests/output/playwright
          if-no-files-found: warn

  public-smoke:
    name: Public Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public smoke Playwright suite
        run: npm run test:e2e:public-smoke

      - name: Upload public smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-public-smoke-artifacts
          path: tests/output/playwright
          if-no-files-found: warn

  live-authenticated:
    name: Live Authenticated
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      JIRA_LIVE_INSTANCE_URL: ${{ vars.JIRA_LIVE_INSTANCE_URL }}
      JIRA_LIVE_PROJECT_KEYS: ${{ vars.JIRA_LIVE_PROJECT_KEYS }}
      JIRA_LIVE_ISSUE_KEYS: ${{ vars.JIRA_LIVE_ISSUE_KEYS }}
      JIRA_LIVE_STORAGE_STATE: tests/.auth/jira-live.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Write Jira live storage state
        if: secrets.JIRA_LIVE_STORAGE_STATE_JSON != ''
        run: mkdir -p tests/.auth && printf '%s' "$JIRA_LIVE_STORAGE_STATE_JSON" > tests/.auth/jira-live.json
        env:
          JIRA_LIVE_STORAGE_STATE_JSON: ${{ secrets.JIRA_LIVE_STORAGE_STATE_JSON }}

      - name: Run live authenticated Playwright suite
        if: secrets.JIRA_LIVE_STORAGE_STATE_JSON != ''
        run: npm run test:e2e:live-authenticated

      - name: Upload live authenticated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-authenticated-artifacts
          path: tests/output/playwright
          if-no-files-found: warn
