name: Playwright Suites

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extension-preflight:
    name: Extension Preflight
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest and version wiring
        run: npm run validate:manifest

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Confirm extension startup
        run: npm run test:e2e:startup-smoke

  mock-edge:
    name: Mock Edge
    runs-on: ubuntu-latest
    needs: [extension-preflight]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mock edge Playwright suite
        run: npm run test:e2e:mock-edge

      - name: Upload mock edge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mock-edge-artifacts
          path: tests/output/playwright
          if-no-files-found: warn

  public-smoke:
    name: Public Smoke
    runs-on: ubuntu-latest
    needs: [extension-preflight]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public smoke Playwright suite
        run: npm run test:e2e:public-smoke

      - name: Upload public smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-public-smoke-artifacts
          path: tests/output/playwright
          if-no-files-found: warn

  live-authenticated:
    name: Live Authenticated
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [extension-preflight]
    env:
      MOCK: 'false'
      JIRA_LIVE_INSTANCE_URL: ${{ vars.JIRA_LIVE_INSTANCE_URL }}
      JIRA_LIVE_PROJECT_KEYS: ${{ vars.JIRA_LIVE_PROJECT_KEYS }}
      JIRA_LIVE_ISSUE_KEYS: ${{ vars.JIRA_LIVE_ISSUE_KEYS }}
      JIRA_LIVE_STORAGE_STATE: tests/.auth/jira-live.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Write Jira live storage state
        run: |
          mkdir -p tests/.auth
          if [ -n "$JIRA_LIVE_STORAGE_STATE_JSON" ]; then
            printf '%s' "$JIRA_LIVE_STORAGE_STATE_JSON" > tests/.auth/jira-live.json
          fi
        env:
          JIRA_LIVE_STORAGE_STATE_JSON: ${{ secrets.JIRA_LIVE_STORAGE_STATE_JSON }}

      - name: Run live authenticated Playwright suite
        run: npm run test:e2e:live-authenticated

      - name: Upload live authenticated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-authenticated-artifacts
          path: tests/output/playwright
          if-no-files-found: warn
